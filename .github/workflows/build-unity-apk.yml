name: Build Walhero Battle Lite APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild and extract Unity project
        shell: bash
        run: |
          cat project_parts/part*.b64 > Walhero-Battle-Lite-Unity.zip.b64
          base64 --decode Walhero-Battle-Lite-Unity.zip.b64 > Walhero-Battle-Lite-Unity.zip
          echo "130f3b8701dcec16d90582ebbdbd2f5014fa3fc384275585f8a4a510ea2c4d6a  Walhero-Battle-Lite-Unity.zip" | sha256sum --check
          unzip -o Walhero-Battle-Lite-Unity.zip

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Walhero-Battle-Lite-Unity/Library
          key: unity-library-${{ hashFiles('project_parts/**') }}
          restore-keys: unity-library-

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Walhero-Battle-Lite-Unity
          targetPlatform: Android
          unityVersion: 6000.0.71f1
          buildMethod: BuildAndroid.PerformBuild
          customParameters: -BUILD_PATH Builds/Walhero-Battle-Lite.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Walhero-Battle-Lite-APK
          path: Walhero-Battle-Lite-Unity/Builds/Walhero-Battle-Lite.apk
